repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo +nightly fmt --all
        language: system
        pass_filenames: false
      - id: line-length-check
        name: check line length (100 chars)
        entry: python3 scripts/check_line_length.py
        language: system
        pass_filenames: false
        files: "\\.rs$"
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
